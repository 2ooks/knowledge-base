# Automatically merges wiki ingestion PRs created by any coding agent.
# Triggers when a PR is opened, marked ready for review, or updated.
# Merges any agent-authored PR targeting main, regardless of draft status.
name: Auto-merge agent ingestion PRs

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      (github.event.pull_request.user.login == 'Copilot' ||
       github.event.pull_request.user.login == 'Claude') &&
      github.event.pull_request.base.ref == 'main'
    steps:
      - name: Wait for mergeability check
        run: sleep 10

      - name: Convert draft to ready if needed
        if: github.event.pull_request.draft == true
        env:
          GH_TOKEN: ${{ secrets.KB_PAT }}
        run: gh pr ready ${{ github.event.pull_request.number }} --repo ${{ github.repository }}

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.KB_PAT }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --repo ${{ github.repository }}