# Automatically merges wiki ingestion PRs created by the Copilot coding agent.
# Triggers when a PR is opened, marked ready for review, or updated.
# Only acts on non-draft PRs authored by Copilot targeting the main branch.
name: Auto-merge Copilot ingestion PRs

on:
  pull_request:
    types: [opened, ready_for_review, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.user.login == 'Copilot' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.base.ref == 'main'
    steps:
      - name: Wait for mergeability check
        run: sleep 5

      - name: Merge PR
        env:
          GH_TOKEN: ${{ secrets.KB_PAT }}
        run: gh pr merge ${{ github.event.pull_request.number }} --squash --repo ${{ github.repository }}
