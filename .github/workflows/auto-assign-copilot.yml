# Prepares new-source issues for Copilot ingestion.
# Copilot cannot be assigned programmatically via API (GraphQL or REST),
# so this workflow adds the new-source label and posts a reminder comment.
# The user then assigns Copilot manually from GitHub Mobile (one tap).
name: Prepare new-source issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  prepare-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'New Source')
    steps:
      - name: Add new-source label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ github.event.issue.number }} --add-label "new-source" --repo ${{ github.repository }}

      - name: Post reminder comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} --body "📱 **New source received.** Assign Copilot to this issue to start ingestion."