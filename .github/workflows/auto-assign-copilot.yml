# Prepares new-source issues for Copilot ingestion.
# Copilot cannot be assigned programmatically via API (GraphQL or REST),
# so this workflow adds the new-source label and @mentions the owner
# to trigger a push notification on GitHub Mobile.
# The user then assigns Copilot from the notification (one tap).
name: Prepare new-source issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  prepare-issue:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.title, 'New Source')
    steps:
      - name: Add new-source label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue edit ${{ github.event.issue.number }} --add-label "new-source" --repo ${{ github.repository }}

      - name: Notify owner to assign Copilot
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "@${{ github.repository_owner }} 📱 **New source ready.** Open this issue and tap **Assignees → Copilot** to start ingestion. The PR will auto-merge when done."