# Automatically assigns the Copilot coding agent to any issue that is part of
# the "Add to KB" mobile workflow, so the user doesn't have to do it manually.
# Triggers when an issue is opened and either carries the `new-source` label
# or has "New Source" in the title (fallback for when the label isn't applied
# by the iOS Shortcut reliably).
name: Auto-assign Copilot to new-source issues

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  assign-copilot:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.issue.labels.*.name, 'new-source') ||
      contains(github.event.issue.title, 'New Source')
    steps:
      - name: Assign Copilot to the issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --add-assignee Copilot \
            --repo ${{ github.repository }}
