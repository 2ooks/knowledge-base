# Fully automated wiki ingestion via Claude API.
# Triggers when an issue is opened with the new-source label.
# Fetches article content, calls Claude to generate wiki files,
# commits directly to main, and closes the issue.
name: Auto-ingest new source

on:
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    if: contains(join(github.event.issue.labels.*.name, ','), 'new-source')
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.KB_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic requests beautifulsoup4 markdownify

      - name: Run ingestion
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python .github/scripts/ingest.py

      - name: Commit and push
        run: |
          git config user.name "wiki-bot"
          git config user.email "wiki-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Ingest source from issue #${{ github.event.issue.number }}"
            git push
          fi

      - name: Close issue
        env:
          GH_TOKEN: ${{ secrets.KB_PAT }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "✅ Auto-ingested. Files committed to main."
          gh issue close ${{ github.event.issue.number }} \
            --repo ${{ github.repository }}
